name: Deploy Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      reason:
        description: Optional reason for manual deploy
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          node tools/upstream/prepareHostedRelease.js --out-dir .pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

