name: Deploy Pages

on:
  push:
    branches:
      - master
      - dev/pages-publish
  workflow_dispatch:
    inputs:
      reason:
        description: Optional reason for manual deploy
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare combined Pages artifact (/release + /dev)
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin master dev/pages-publish

          rm -rf .worktrees
          mkdir -p .worktrees
          git worktree add --detach .worktrees/master origin/master
          git worktree add --detach .worktrees/dev origin/dev/pages-publish

          PAGES_DIR="${GITHUB_WORKSPACE}/.pages"
          rm -rf "$PAGES_DIR"
          mkdir -p "$PAGES_DIR"

          node .worktrees/master/tools/upstream/prepareHostedRelease.js --out-dir "$PAGES_DIR" --channel release
          node .worktrees/dev/tools/upstream/prepareHostedRelease.js --out-dir "$PAGES_DIR" --channel dev

          git worktree remove .worktrees/master --force
          git worktree remove .worktrees/dev --force
          rm -rf .worktrees

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

