name: Build And Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Validate release tag against appinfo
        run: node tools/release/verifyReleaseTag.js "${GITHUB_REF_NAME}"

      - name: Install dependencies
        run: npm ci

      - name: Prepare hosted deploy artifact (validation only)
        run: npm run hosted:prepare

      - name: Run lint checks
        run: npm run lint

      - name: Build webOS package
        run: npm run webos:package

      - name: Generate Homebrew release artifacts
        run: npm run release:artifacts

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          allowUpdates: true
          omitBodyDuringUpdate: true
          artifacts: 'build/*.ipk,build/*.manifest.json,build/*.apps-repo.yml'

