name: "webOS feature request"
description: "Suggest a feature for SmartTwitchWebOSTV webOS integration"
title: "[webOS feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **ATTENTION:** This repository is for **LG webOS-specific** SmartTwitchTV integration only. This project is NOT actively maintained.

        For core app features (non-webOS), please use the upstream project:
        https://github.com/fgl27/SmartTwitchTV/issues

  - type: checkboxes
    attributes:
      label: Scope confirmation
      description: |
        Please confirm before submitting.
      options:
        - label: This request is specific to LG webOS behavior in this fork (wrapper, bridge, packaging, lifecycle, remote input).
          required: true
        - label: I understand non-webOS features should be requested upstream at https://github.com/fgl27/SmartTwitchTV/issues
          required: true
        - label: I searched existing issues to avoid duplicates.
          required: true

  - type: input
    id: app_version
    attributes:
      label: SmartTwitchWebOSTV version
      description: "Tag, release version, or commit SHA (if built locally)."
      placeholder: "vX.Y.Z or commit abc1234"
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Requested area
      options:
        - webOS compatibility bridge
        - Wrapper app behavior (startup, lifecycle, back handling)
        - Packaging / install / deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: "What webOS-specific limitation or pain point are you trying to solve?"
      placeholder: "On webOS, X currently behaves like ... which makes ... difficult."
      render: text
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: "Describe the feature you want."
      placeholder: "Add a bridge method / wrapper behavior so that ..."
      render: text
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Optional: workarounds or alternatives you've considered."
      render: text
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: User impact
      description: "Who benefits and what improves if this is implemented?"
      render: text
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional information
      placeholder: "Drag and drop images here if needed"
      render: text
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        Thanks for helping improve SmartTwitchWebOSTV.

            
